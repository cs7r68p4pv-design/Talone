<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snapchat Map Mockup</title>
    <!-- Tailwind CSS للتحكم في الألوان والأشكال -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* حركة خفيفة للخلفية باش تبان بحال يلا الشخص كيتنقل في الخريطة */
        @keyframes mapMovement {
            0% { transform: scale(1.1) translate(0px, 0px); }
            50% { transform: scale(1.18) translate(-15px, -10px); }
            100% { transform: scale(1.1) translate(0px, 0px); }
        }
        .animate-map {
            animation: mapMovement 25s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-[#0f0f11] flex justify-center items-center h-screen m-0 overflow-hidden select-none">

    <!-- شاشة الهاتف (مكيفة تماماً للتصوير) -->
    <div class="relative w-[390px] h-[844px] bg-black rounded-[55px] shadow-2xl overflow-hidden border-[10px] border-black">
        
        <!-- صورة الخريطة الجوية (Satellite) خدامة ومضمونة -->
        <div class="absolute inset-0 animate-map bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1524661135339-9140b00789ee?q=80&w=1000&auto=format&fit=crop');">
            <!-- طبقة ضبابية خفيفة باش الألوان تجي متناسقة بحال سناب شات -->
            <div class="absolute inset-0 bg-black/15"></div>
        </div>

        <!-- الأيقونات الفوقانية (المدينة وحالة الطقس) -->
        <div class="absolute top-14 left-5 right-5 flex justify-between items-center text-white font-sans drop-shadow-lg z-10">
            <button class="bg-black/40 hover:bg-black/60 p-2.5 rounded-full backdrop-blur-xl transition-all text-sm w-9 h-9 flex items-center justify-center">✕</button>
            <div class="text-center bg-black/40 px-5 py-1.5 rounded-full backdrop-blur-xl border border-white/5">
                <div class="font-bold text-xs tracking-wide">Pfungstadt</div>
                <div class="text-[10px] opacity-90 mt-0.5">☁️ 9°C</div>
            </div>
            <div class="w-9"></div> 
        </div>

        <!-- البوب-أب ديال التعليق (Reply to comment) بحال لي ف الفيديو -->
        <div class="absolute top-44 left-6 bg-white text-black rounded-2xl p-3 shadow-xl max-w-[220px] font-sans text-xs border border-gray-100 z-10">
            <div class="text-[10px] text-gray-500 mb-1">Reply to ellay43_'s comment</div>
            <div class="font-semibold leading-tight">Is it free to use?</div>
            <!-- سهم الفقرة الأسفل -->
            <div class="absolute bottom-[-6px] left-5 w-3 h-3 bg-white rotate-45"></div>
        </div>

        <!-- البطاقة السوداء التحتانية (Snapchat Card) -->
        <div class="absolute bottom-8 left-4 right-4 bg-[#121212]/95 text-white rounded-[32px] p-4 font-sans backdrop-blur-2xl border border-white/5 shadow-2xl z-10">
            
            <!-- أزرار التفاعل (Emojis) -->
            <div class="flex justify-between items-center px-3 mb-4">
                <span class="text-2xl filter drop-shadow hover:scale-120 transition-transform cursor-pointer">💛</span>
                <span class="text-2xl filter drop-shadow hover:scale-120 transition-transform cursor-pointer">👀</span>
                <span class="text-2xl filter drop-shadow hover:scale-120 transition-transform cursor-pointer">🤔</span>
                <span class="text-2xl filter drop-shadow hover:scale-120 transition-transform cursor-pointer">➕</span>
            </div>

            <!-- إطار معلومات الحساب (البطاقة الداخلية) -->
            <div class="bg-[#1c1c1e] rounded-2xl p-3.5 flex items-center justify-between border border-white/5 shadow-inner">
                <div class="flex items-center gap-3">
                    <!-- الصورة الشخصية (Bitmoji) تقد تبدلها برابط صورة إلا بغيتي -->
                    <div class="w-12 h-12 bg-gradient-to-tr from-yellow-400 to-amber-300 rounded-xl flex items-center justify-center text-2xl shadow-md">
                        👦🏽
                    </div>
                    <div>
                        <!-- هنا تقدر تبدل السمية والـ Badge الأصفر -->
                        <h3 class="font-black text-base tracking-wide flex items-center gap-1">
                            travis
                            <span class="text-[9px] bg-[#fffc00] text-black px-1.5 py-0.5 rounded-full font-black">★</span>
                        </h3>
                        <p class="text-[11px] text-gray-400 mt-0.5 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-[#00ff66] rounded-full inline-block animate-pulse"></span>
                            Last active just now
                        </p>
                        <p class="text-[11px] text-[#fffc00] font-bold mt-1">📌 Snapping Ella R 🌟</p>
                    </div>
                </div>
            </div>

            <!-- أزرار الشات والكاميرا السفلى -->
            <div class="grid grid-cols-5 gap-2.5 mt-3.5">
                <button class="col-span-1 bg-[#2c2c2e] active:bg-[#3a3a3c] transition-colors h-12 rounded-xl flex items-center justify-center text-lg shadow-md">
                    📷
                </button>
                <button class="col-span-4 bg-[#fffc00] text-black active:bg-[#e6e300] transition-colors h-12 rounded-xl flex items-center justify-center gap-2 font-black text-sm shadow-md tracking-wide">
                    💬 Chat
                </button>
            </div>

        </div>

    </div>

</body>
</html>
